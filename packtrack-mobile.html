<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PackTrack</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0883e">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#7d8590;--accent:#f0883e;--accent-bg:rgba(240,136,62,.12);
  --green:#3fb950;--green-bg:rgba(63,185,80,.1);--red:#f85149;--red-bg:rgba(248,81,73,.1);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.hidden{display:none!important}
input,select,textarea{font-family:var(--sans);font-size:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);outline:none;transition:border-color .15s;width:100%;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.field{margin-bottom:14px}
.btn{font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:opacity .15s,transform .1s;padding:14px 20px;width:100%}
.btn:active{transform:scale(.98);opacity:.85}
.btn-primary{background:var(--accent);color:#000}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login-view{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;position:relative}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);border-radius:20px 20px 0 0}
.login-logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:26px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-company{font-size:12px;color:var(--muted);text-align:center;margin-top:18px;font-family:var(--mono)}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-top:12px;background:var(--red-bg);border:1px solid rgba(248,81,73,.3);color:var(--red)}

/* APP SHELL */
/* PASSWORD TOGGLE */
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--muted);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}
.eye-btn:active{color:var(--accent)}
#app-view{flex:1;display:none;flex-direction:column;height:100%}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;padding-top:calc(10px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-brand{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:3px}
.topbar-user{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-bg);border:1px solid rgba(240,136,62,.4);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent)}
.user-name{font-size:12px;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--sans);font-weight:600}
.logout-btn:active{background:var(--red-bg);color:var(--red)}

/* TAB BAR — 4 tabs */
.tab-bar{background:var(--bg);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bottom)}
.tab-item{flex:1;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;border-top:2px solid transparent}
.tab-item.active{border-top-color:var(--accent)}
.tab-icon{font-size:16px;margin-bottom:2px}
.tab-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.tab-item.active .tab-label{color:var(--accent)}
.content-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:14px}
.panel.active{display:block}

/* EARNINGS CARD — compact */
.earnings-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.eb-left{}
.eb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:2px}
.eb-amount{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--accent)}
.eb-right{text-align:right}
.eb-meta{font-size:11px;color:var(--muted)}
.eb-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}

/* SCAN CARD */
.scan-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
.scan-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:14px}
.barcode-wrap{position:relative;margin-bottom:10px}
.barcode-wrap input{font-family:var(--mono);font-size:16px;padding-right:44px;letter-spacing:1px}
.barcode-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.3;pointer-events:none}
.product-found{background:var(--surface2);border:1px solid rgba(63,185,80,.4);border-radius:10px;padding:10px 13px;margin-bottom:10px;display:none;animation:fadeIn .2s ease}
.product-found.show{display:block}
.product-not-found{background:var(--red-bg);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:10px 13px;margin-bottom:10px;display:none;animation:fadeIn .2s ease}
.product-not-found.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pf-name{font-size:14px;font-weight:700}
.pf-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}

/* WORK TYPE — dropdown style */
.wt-select-wrap{margin-bottom:10px}
.wt-select-wrap select{font-size:15px;padding:12px 14px;background:var(--surface2)}
.wt-selected-info{background:var(--accent-bg);border:1px solid rgba(240,136,62,.3);border-radius:10px;padding:10px 14px;display:none;animation:fadeIn .15s ease;margin-bottom:10px}
.wt-selected-info.show{display:flex;align-items:center;justify-content:space-between}
.wsi-code{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent)}
.wsi-name{font-size:12px;color:var(--muted);margin-top:2px}
.wsi-rate{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}

.earn-preview{background:var(--green-bg);border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ep-label{font-size:13px;color:var(--muted)}
.ep-value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--green)}

/* HISTORY */
.history-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.hs-item{background:var(--surface2);border-radius:8px;padding:10px}
.hs-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.hs-value{font-family:var(--mono);font-size:16px;font-weight:700}
.hs-value.accent{color:var(--accent)}
.hs-value.green{color:var(--green)}
.month-group{margin-bottom:14px}
.month-header{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:6px 0 5px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:7px}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rc-product{font-size:13px;font-weight:700;line-height:1.3;flex:1;padding-right:10px}
.rc-earn{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green);white-space:nowrap}
.rc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.tag.accent{background:var(--accent-bg);border-color:rgba(240,136,62,.3);color:var(--accent)}
.rc-time{font-size:10px;color:var(--muted);font-family:var(--mono)}

/* PRODUCT INFO TAB */
.pi-search{position:relative;margin-bottom:12px}
.pi-search input{padding-left:36px}
.pi-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.pi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px}
.pi-name{font-size:14px;font-weight:700;margin-bottom:4px}
.pi-barcode{font-family:var(--mono);font-size:12px;color:var(--accent)}
.pi-code{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.pi-extra{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}

/* WORK TYPE INFO TAB */
.wt-info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.wtic-left{}
.wtic-code{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent)}
.wtic-name{font-size:12px;color:var(--muted);margin-top:3px}
.wtic-rate{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.3}
.empty-text{font-size:13px}

/* TOAST */
.toast-wrap{position:fixed;bottom:calc(58px + var(--safe-bottom));left:14px;right:14px;z-index:100;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 15px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.t-success{border-left:3px solid var(--green)}
.toast.t-error{border-left:3px solid var(--red)}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--muted);font-family:var(--mono)">PACKTRACK</div>
</div>

<!-- LOGIN -->
<div id="login-view" class="hidden">
  <div class="login-card">
    <div class="login-logo">PackTrack</div>
    <h1 class="login-title">Sign In</h1>
    <p class="login-sub">Packaging Management</p>
    <div class="field"><label>Employee ID</label><input type="text" id="login-user" placeholder="V001" autocomplete="off" autocapitalize="none"></div>
    <div class="field"><label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="login-pass" placeholder="••••••" autocomplete="current-password">
        <button class="eye-btn" type="button" onclick="togglePass()" id="eye-btn">
          <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-err" class="alert hidden"></div>
    <div class="login-company">K&H Wholesale Trading</div>
  </div>
</div>

<!-- APP -->
<div id="app-view">
  <div class="topbar">
    <span class="topbar-brand">PACKTRACK</span>
    <div class="topbar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="content-area">

    <!-- SCAN -->
    <div id="panel-scan" class="panel active">
      <div class="earnings-bar">
        <div class="eb-left">
          <div class="eb-label">Today's Earnings</div>
          <div class="eb-amount" id="today-earn">RM 0.00</div>
        </div>
        <div class="eb-right">
          <div class="eb-meta" id="today-meta">0 records</div>
          <div class="eb-date" id="today-date"></div>
        </div>
      </div>
      <div class="scan-card">
        <div class="scan-title">▣ New Record</div>
        <div class="field">
          <label>Barcode</label>
          <div class="barcode-wrap">
            <input type="text" id="bc-input" placeholder="Scan or enter barcode..." autocomplete="off" inputmode="numeric">
            <span class="barcode-icon">▥</span>
          </div>
          <div id="product-found" class="product-found">
            <div class="pf-name" id="pf-name"></div>
            <div class="pf-meta" id="pf-code"></div>
          </div>
          <div id="product-not-found" class="product-not-found">
            <div style="font-size:13px;color:var(--red)">⚠ Barcode not found in system</div>
          </div>
        </div>

        <!-- WORK TYPE DROPDOWN -->
        <div class="field">
          <label>Work Type</label>
          <div class="wt-select-wrap">
            <select id="wt-select" onchange="onWTSelect(this.value)">
              <option value="">— Select work type —</option>
            </select>
          </div>
          <div id="wt-selected-info" class="wt-selected-info">
            <div>
              <div class="wsi-code" id="wsi-code"></div>
              <div class="wsi-name" id="wsi-name"></div>
            </div>
            <div class="wsi-rate" id="wsi-rate"></div>
          </div>
        </div>

        <div class="field">
          <label>Quantity (pieces)</label>
          <input type="number" id="qty-input" placeholder="0" inputmode="numeric" min="1" oninput="calcEarn()">
        </div>
        <div class="earn-preview">
          <span class="ep-label">Earnings</span>
          <span class="ep-value" id="earn-preview">RM 0.00</span>
        </div>
        <button class="btn btn-primary" onclick="submitRecord()" id="submit-btn">✓ Submit Record</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="panel-history" class="panel">
      <div class="history-summary">
        <div class="hs-item"><div class="hs-label">This Month</div><div class="hs-value accent" id="month-earn">RM 0</div></div>
        <div class="hs-item"><div class="hs-label">All Time</div><div class="hs-value green" id="total-earn">RM 0</div></div>
        <div class="hs-item"><div class="hs-label">Today</div><div class="hs-value" id="hist-today-count">0 records</div></div>
        <div class="hs-item"><div class="hs-label">This Month</div><div class="hs-value" id="hist-month-count">0 records</div></div>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- PRODUCT INFO -->
    <div id="panel-prodinfo" class="panel">
      <div class="pi-search">
        <span class="pi-search-icon">⌕</span>
        <input type="text" id="pi-search-input" placeholder="Search product or barcode..." oninput="filterProductInfo()">
      </div>
      <div id="pi-list"></div>
    </div>

    <!-- WORK TYPE INFO -->
    <div id="panel-worktype" class="panel">
      <div id="wt-info-list"></div>
    </div>

  </div>

  <!-- 4 TAB BAR -->
  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('scan',this)">
      <div class="tab-icon">▣</div><div class="tab-label">Scan</div>
    </div>
    <div class="tab-item" onclick="switchTab('history',this)">
      <div class="tab-icon">≡</div><div class="tab-label">History</div>
    </div>
    <div class="tab-item" onclick="switchTab('prodinfo',this)">
      <div class="tab-icon">▦</div><div class="tab-label">Products</div>
    </div>
    <div class="tab-item" onclick="switchTab('worktype',this)">
      <div class="tab-icon">◆</div><div class="tab-label">Work Type</div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyBdMdNTmGW3S-8Yld2XFSPpnbMtEnmaDaY",
  authDomain:"clockin-82306.firebaseapp.com",
  databaseURL:"https://clockin-82306-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"clockin-82306",
  storageBucket:"clockin-82306.firebasestorage.app",
  messagingSenderId:"1072015314964",
  appId:"1:1072015314964:web:e1d9b92d1c2afea84c9701"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentUser=null,prices={},products={},selectedWT=null,currentProduct=null;

const WORK_TYPES=[
  {code:'PO',name:'PACKING ONION'},
  {code:'PK',name:'PACKING KACANG'},
  {code:'PG',name:'PACKING GENERAL'},
  {code:'S',name:'SEALING'},
  {code:'PB',name:'PACKING IN BEG'},
  {code:'W',name:'WEIGHING'},
  {code:'T',name:'TAPE'},
  {code:'TB',name:'TAPE IN CTN'},
  {code:'TM',name:'TAPE W/MACHINE'},
  {code:'SP',name:'SPECIAL CASE'},
];

const fmt=n=>'RM '+parseFloat(n||0).toFixed(2);
const getToday=()=>new Date().toISOString().slice(0,10);
const getMonth=()=>new Date().toISOString().slice(0,7);

async function init(){
  try{
    const snap=await db.ref('packtrack/settings/prices').get();
    if(snap.exists())prices=snap.val();
    else{const d={PO:0.040,PK:0.070,PG:0.040,S:0.020,PB:0.020,W:0.060,T:0.030,TB:0.010,TM:0.025,SP:0.000};await db.ref('packtrack/settings/prices').set(d);prices=d;}
    const pSnap=await db.ref('products').get();
    if(pSnap.exists())products=pSnap.val();
  }catch(e){console.error(e)}
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
}

function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  const errEl=document.getElementById('login-err');
  if(!user||!pass){errEl.textContent='Please enter ID and password';errEl.classList.remove('hidden');return}
  db.ref('hr_employees').get().then(snap=>{
    let found=null;
    if(snap.exists())snap.forEach(c=>{const e=c.val();if((e.id===user||e.username===user)&&e.password===pass&&e.active!==false&&(e.department==='packaging'||e.department==='all'))found=e;});
    if(found)loginSuccess(found);
    else{errEl.textContent='Invalid credentials or no access.';errEl.classList.remove('hidden');}
  }).catch(()=>{errEl.textContent='Connection error.';errEl.classList.remove('hidden');});
}

function togglePass(){
  const inp=document.getElementById('login-pass');
  const icon=document.getElementById('eye-icon');
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  icon.innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
function loginSuccess(emp){
  currentUser=emp;
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('app-view').style.display='flex';
  document.getElementById('app-view').style.flexDirection='column';
  document.getElementById('user-name').textContent=emp.name.split(' ')[0];
  document.getElementById('user-avatar').textContent=emp.name[0];
  const d=new Date();
  document.getElementById('today-date').textContent=d.toLocaleDateString('en-MY',{day:'numeric',month:'short'});
  buildWTDropdown();
  updateTodayEarnings();
}

function doLogout(){
  currentUser=null;selectedWT=null;currentProduct=null;
  ['login-user','login-pass','bc-input','qty-input'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('login-err').classList.add('hidden');
  document.getElementById('product-found').classList.remove('show');
  document.getElementById('product-not-found').classList.remove('show');
  document.getElementById('wt-select').value='';
  document.getElementById('wt-selected-info').classList.remove('show');
  document.getElementById('app-view').style.display='none';
  document.getElementById('login-view').classList.remove('hidden');
  switchTab('scan',document.querySelector('.tab-item'));
}

function switchTab(tab,el){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='history')loadHistory();
  if(tab==='prodinfo')renderProductInfo();
  if(tab==='worktype')renderWorkTypeInfo();
}

// BUILD WORK TYPE DROPDOWN
function buildWTDropdown(){
  const sel=document.getElementById('wt-select');
  sel.innerHTML='<option value="">— Select work type —</option>'+
    WORK_TYPES.map(wt=>`<option value="${wt.code}">${wt.code} — ${wt.name}  (RM ${(prices[wt.code]||0).toFixed(3)}/pc)</option>`).join('');
}

function onWTSelect(code){
  selectedWT=code||null;
  const info=document.getElementById('wt-selected-info');
  if(!code){info.classList.remove('show');calcEarn();return;}
  const wt=WORK_TYPES.find(w=>w.code===code);
  const rate=prices[code]||0;
  document.getElementById('wsi-code').textContent=wt.code;
  document.getElementById('wsi-name').textContent=wt.name;
  document.getElementById('wsi-rate').textContent='RM '+rate.toFixed(3)+'/pc';
  info.classList.add('show');
  calcEarn();
}

function lookupBarcode(bc){
  const key=bc.replace(/[.#$[\]]/g,'_');
  let found=null;
  Object.values(products).forEach(p=>{if(p.barcode===bc)found=p});
  if(found){showProduct(found);return;}
  if(products[key]){showProduct(products[key]);return;}
  db.ref('products').orderByChild('barcode').equalTo(bc).limitToFirst(1).get().then(s=>{
    if(s.exists()){let p;s.forEach(c=>{p=c.val()});showProduct(p);}
    else showNotFound();
  });
}

function showProduct(p){
  currentProduct=p;
  document.getElementById('pf-name').textContent=p.name;
  document.getElementById('pf-code').textContent=(p.code||'')+' · '+p.barcode;
  document.getElementById('product-found').classList.add('show');
  document.getElementById('product-not-found').classList.remove('show');
  calcEarn();
}

function showNotFound(){
  currentProduct=null;
  document.getElementById('product-found').classList.remove('show');
  document.getElementById('product-not-found').classList.add('show');
  calcEarn();
}

function calcEarn(){
  const qty=parseFloat(document.getElementById('qty-input').value)||0;
  const rate=selectedWT&&prices[selectedWT]!=null?prices[selectedWT]:0;
  document.getElementById('earn-preview').textContent=fmt(qty*rate);
}

async function submitRecord(){
  if(!currentProduct){toast('Please scan a valid barcode','error');return}
  if(!selectedWT){toast('Please select work type','error');return}
  const qty=parseFloat(document.getElementById('qty-input').value)||0;
  if(qty<=0){toast('Please enter quantity','error');return}
  const rate=prices[selectedWT]||0;
  const earn=qty*rate;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    await db.ref('packtrack/pt_records').push({
      empId:currentUser.id,empName:currentUser.name,
      barcode:currentProduct.barcode,productCode:currentProduct.code||'',productName:currentProduct.name,
      workType:selectedWT,qty,rate,earnings:earn,date:getToday(),timestamp:Date.now()
    });
    toast('Saved! Earned '+fmt(earn),'success');
    document.getElementById('bc-input').value='';
    document.getElementById('qty-input').value='';
    document.getElementById('product-found').classList.remove('show');
    document.getElementById('product-not-found').classList.remove('show');
    document.getElementById('wt-select').value='';
    document.getElementById('wt-selected-info').classList.remove('show');
    currentProduct=null;selectedWT=null;calcEarn();updateTodayEarnings();
  }catch(e){toast('Save failed. Check connection.','error');}
  btn.disabled=false;btn.textContent='✓ Submit Record';
}

async function updateTodayEarnings(){
  const today=getToday();
  try{
    const snap=await db.ref('packtrack/pt_records').orderByChild('empId').equalTo(currentUser.id).get();
    let earn=0,count=0;
    if(snap.exists())snap.forEach(c=>{const r=c.val();if(r.date===today){earn+=r.earnings;count++;}});
    document.getElementById('today-earn').textContent=fmt(earn);
    document.getElementById('today-meta').textContent=count+' record'+(count!==1?'s':'');
  }catch(e){}
}

async function loadHistory(){
  const histList=document.getElementById('history-list');
  histList.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Loading...</div>';
  try{
    const snap=await db.ref('packtrack/pt_records').orderByChild('empId').equalTo(currentUser.id).get();
    if(!snap.exists()){histList.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No records yet</div></div>';return;}
    const recs=[];snap.forEach(c=>recs.push(c.val()));recs.sort((a,b)=>b.timestamp-a.timestamp);
    const today=getToday(),month=getMonth();
    let totalEarn=0,monthEarn=0,todayCount=0,monthCount=0;
    recs.forEach(r=>{totalEarn+=r.earnings;if(r.date&&r.date.startsWith(month)){monthEarn+=r.earnings;monthCount++;}if(r.date===today)todayCount++;});
    document.getElementById('month-earn').textContent=fmt(monthEarn);
    document.getElementById('total-earn').textContent=fmt(totalEarn);
    document.getElementById('hist-today-count').textContent=todayCount+' records';
    document.getElementById('hist-month-count').textContent=monthCount+' records';
    const byDate={};recs.forEach(r=>{const d=r.date||'Unknown';if(!byDate[d])byDate[d]=[];byDate[d].push(r);});
    let html='';
    Object.keys(byDate).sort().reverse().forEach(date=>{
      const dr=byDate[date];const dtotal=dr.reduce((s,r)=>s+r.earnings,0);
      html+=`<div class="month-group"><div class="month-header"><span>${date}</span><span style="color:var(--green);font-family:var(--mono)">${fmt(dtotal)}</span></div>`;
      dr.forEach(r=>{html+=`<div class="rec-card"><div class="rc-top"><div class="rc-product">${r.productName}</div><div class="rc-earn">${fmt(r.earnings)}</div></div><div class="rc-tags"><span class="tag accent">${r.workType}</span><span class="tag">${r.qty} pcs</span><span class="tag">RM ${(r.rate||0).toFixed(3)}/pc</span></div><div class="rc-time">${new Date(r.timestamp).toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'})}</div></div>`;});
      html+='</div>';
    });
    histList.innerHTML=html;
  }catch(e){histList.innerHTML='<div class="empty-state"><div class="empty-text">Failed to load</div></div>';}
}

// PRODUCT INFO TAB
function renderProductInfo(){
  const q=(document.getElementById('pi-search-input').value||'').toLowerCase();
  filterProductInfo(q);
}
function filterProductInfo(){
  const q=document.getElementById('pi-search-input').value.toLowerCase();
  const list=document.getElementById('pi-list');
  const prods=Object.values(products).filter(p=>
    !q||(p.name||'').toLowerCase().includes(q)||(p.barcode||'').includes(q)||(p.code||'').toLowerCase().includes(q)
  );
  if(!prods.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">▦</div><div class="empty-text">No products found</div></div>';return;}
  list.innerHTML=prods.map(p=>`
    <div class="pi-card">
      <div class="pi-name">${p.name}</div>
      <div class="pi-barcode">${p.barcode}</div>
      <div class="pi-code">${p.code||''}</div>
      ${p.info?`<div class="pi-extra">${p.info}</div>`:''}
    </div>`).join('');
}

// WORK TYPE INFO TAB
function renderWorkTypeInfo(){
  document.getElementById('wt-info-list').innerHTML=WORK_TYPES.map(wt=>`
    <div class="wt-info-card">
      <div class="wtic-left">
        <div class="wtic-code">${wt.code}</div>
        <div class="wtic-name">${wt.name}</div>
      </div>
      <div class="wtic-rate">${prices[wt.code]!=null?'RM '+(prices[wt.code]).toFixed(3):'-'}<span style="font-size:10px;color:var(--muted);font-weight:400">/pc</span></div>
    </div>`).join('');
}

function toast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast t-'+type+' show';
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3000);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('login-pass').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
  let timer;
  document.getElementById('bc-input').addEventListener('input',e=>{
    clearTimeout(timer);const val=e.target.value.trim();
    if(!val){document.getElementById('product-found').classList.remove('show');document.getElementById('product-not-found').classList.remove('show');currentProduct=null;calcEarn();return;}
    timer=setTimeout(()=>lookupBarcode(val),400);
  });
  document.getElementById('bc-input').addEventListener('keyup',e=>{if(e.key==='Enter'){clearTimeout(timer);lookupBarcode(e.target.value.trim());}});
});

// Register service worker for PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
init();
</script>
